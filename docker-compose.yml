services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: go_fish
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d go_fish"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.26
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "pnpm db:push && pnpm --filter @go-fish/api start"
    depends_on:
      postgres:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      NODE_ENV: development
      API_HOST: 0.0.0.0
      API_PORT: 8787
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/go_fish
      BETTER_AUTH_SECRET: replace-me-with-a-long-random-string
      BETTER_AUTH_URL: http://localhost:8787
      BETTER_AUTH_TRUSTED_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8787
      NEXT_PUBLIC_WEB_URL: http://localhost:3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-Go Fish <hello@gofish.local>}
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASS: ""
      INTERNAL_WORKER_TOKEN: ${INTERNAL_WORKER_TOKEN:-go-fish-worker-token}
    ports:
      - "8787:8787"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: pnpm --filter @go-fish/worker start
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/go_fish
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GO_FISH_ALLOW_HEURISTIC_FALLBACK: ${GO_FISH_ALLOW_HEURISTIC_FALLBACK:-true}
      WORKER_INTERVAL_MINUTES: ${WORKER_INTERVAL_MINUTES:-5}
    restart: unless-stopped

volumes:
  postgres_data:
