services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://gofish:gofish@db:5432/gofish
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    depends_on:
      - db
    networks:
      - gofish-network

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: gofish
      POSTGRES_PASSWORD: gofish
      POSTGRES_DB: gofish
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gofish-network

  client:
    build: ./client
    ports:
      - "5173:3000"
    depends_on:
      - backend
    networks:
      - gofish-network

networks:
  gofish-network:
    driver: bridge

volumes:
  pgdata:
