name: CI & Deploy

on:
  push:
    branches:
      - main
      - Mo-Dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test — lint, test, audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high

  frontend:
    name: Frontend — lint, build, audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: client
        run: node node_modules/eslint/bin/eslint.js src --max-warnings=0

      - name: Format fix
        working-directory: client
        run: node node_modules/prettier/bin/prettier.cjs --write src

      - name: Type check
        working-directory: client
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Security audit
        working-directory: client
        run: npm audit --audit-level=high

  deploy-functions:
    name: Deploy Edge Functions to Supabase
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Mo-Dev')

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref moiajtcnyimeqllextxn --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
