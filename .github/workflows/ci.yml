name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — build, test, audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Test backend
        run: npm test

      - name: Security audit
        run: npm audit --audit-level=high

  frontend:
    name: Frontend — lint, build, audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: client
        run: node node_modules/eslint/bin/eslint.js src --max-warnings=0

      - name: Format check
        working-directory: client
        run: node node_modules/prettier/bin/prettier.cjs --check src

      - name: Type check
        working-directory: client
        run: node node_modules/typescript/bin/tsc --noEmit

      - name: Build frontend
        working-directory: client
        run: npm run build

      - name: Security audit
        working-directory: client
        run: npm audit --audit-level=high
